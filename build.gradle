plugins {
    id 'com.android.application' version '8.1.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        def retrofit_version = "2.9.0"
        def moshi_version = "1.15.0"
        
        classpath "com.squareup.retrofit2:retrofit:$retrofit_version"
        classpath "com.squareup.retrofit2:converter-moshi:$retrofit_version"
        classpath "com.squareup.moshi:moshi-kotlin:$moshi_version"
    }
}
